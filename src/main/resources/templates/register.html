<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Реєстрація - Digital Wallet</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4">

<div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100 w-full max-w-md">
  <div class="text-center mb-6">
    <h2 class="text-2xl font-bold text-slate-900 tracking-tight">Create an account</h2>
    <p class="text-sm text-slate-500 mt-1">Join the Digital Wallet System</p>
  </div>

  <div th:if="${error}" class="mb-4 p-4 text-sm text-red-700 bg-red-50 rounded-xl border border-red-100" th:text="${error}"></div>

  <form th:action="@{/register}" th:object="${userDto}" method="post" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Full name</label>
      <input type="text" th:field="*{name}"
             class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-slate-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all"
             placeholder="Ivan Ivanov" required>
    </div>

    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
      <input type="email" th:field="*{email}"
             class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-slate-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all"
             placeholder="you@example.com" required>
    </div>

    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
      <input type="password" th:field="*{password}"
             class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-slate-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all"
             placeholder="••••••••" required>
    </div>

    <button type="submit"
            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 rounded-xl transition-colors shadow-sm shadow-indigo-100">
      Sign up
    </button>
  </form>

  <div class="mt-6 text-center text-sm text-slate-600">
    Already have an account?
    <a th:href="@{/login}" class="font-medium text-indigo-600 hover:text-indigo-500 transition-colors">Sign in</a>
  </div>
</div>

</body>
</html>
