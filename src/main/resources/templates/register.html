<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Digital Wallet</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #09090b; color: #e4e4e7; min-height: 100vh; }
  </style>
</head>
<body class="bg-[#09090b] flex items-center justify-center min-h-screen p-4">

<div class="w-full max-w-sm">

  <!-- Logo -->
  <div class="flex items-center gap-2.5 justify-center mb-8">
    <div class="w-9 h-9 bg-[#4f46e5] rounded-[10px] flex items-center justify-center text-lg">◈</div>
    <div>
      <p class="text-[15px] font-semibold text-white leading-none">Wallet</p>
      <p class="text-[11px] text-[#52525b] mt-0.5">Digital Finance</p>
    </div>
  </div>

  <div class="bg-[#111113] border border-[#1c1c1f] rounded-[16px] p-7">

    <div class="mb-6">
      <h2 class="text-[18px] font-semibold text-white tracking-tight">Create account</h2>
      <p class="text-[12.5px] text-[#52525b] mt-1">Join the Digital Wallet System</p>
    </div>

    <div th:if="${error}" class="mb-5 px-4 py-3 text-[12.5px] text-[#fb7185] bg-[rgba(244,63,94,0.07)] rounded-[10px] border border-[rgba(244,63,94,0.15)]" th:text="${error}"></div>

    <form th:action="@{/register}" th:object="${userDto}" method="post" class="space-y-4">

      <div>
        <label class="block text-[12px] font-medium text-[#71717a] mb-1.5 uppercase tracking-wider">Full name</label>
        <input type="text" th:field="*{name}"
               class="w-full px-4 py-2.5 rounded-[10px] bg-[#18181b] border border-[#27272a] text-[#e4e4e7] text-[13.5px] placeholder-[#3f3f46] focus:outline-none focus:border-[#4f46e5] focus:ring-1 focus:ring-[#4f46e5] transition-all"
               placeholder="Ivan Ivanov" required>
      </div>

      <div>
        <label class="block text-[12px] font-medium text-[#71717a] mb-1.5 uppercase tracking-wider">Email</label>
        <input type="email" th:field="*{email}"
               class="w-full px-4 py-2.5 rounded-[10px] bg-[#18181b] border border-[#27272a] text-[#e4e4e7] text-[13.5px] placeholder-[#3f3f46] focus:outline-none focus:border-[#4f46e5] focus:ring-1 focus:ring-[#4f46e5] transition-all"
               placeholder="you@example.com" required>
      </div>

      <div>
        <label class="block text-[12px] font-medium text-[#71717a] mb-1.5 uppercase tracking-wider">Password</label>
        <input type="password" th:field="*{password}"
               class="w-full px-4 py-2.5 rounded-[10px] bg-[#18181b] border border-[#27272a] text-[#e4e4e7] text-[13.5px] placeholder-[#3f3f46] focus:outline-none focus:border-[#4f46e5] focus:ring-1 focus:ring-[#4f46e5] transition-all"
               placeholder="••••••••" required>
      </div>

      <button type="submit"
              class="w-full bg-[#4f46e5] hover:bg-[#4338ca] text-white font-semibold py-2.5 rounded-[10px] text-[13.5px] transition-colors duration-150 mt-2">
        Sign up →
      </button>
    </form>

    <div class="mt-5 pt-5 border-t border-[#1c1c1f] text-center text-[12.5px] text-[#52525b]">
      Already have an account?
      <a th:href="@{/login}" class="text-[#818cf8] font-medium hover:text-[#a5b4fc] transition-colors">Sign in</a>
    </div>
  </div>
</div>

</body>
</html>
