<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід - Digital Wallet</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4">

<div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100 w-full max-w-md">
    <div class="text-center mb-6">
        <h2 class="text-2xl font-bold text-slate-900 tracking-tight">Login to wallet</h2>
        <p class="text-sm text-slate-500 mt-1">Manage your finances securely</p>
    </div>

    <div th:if="${param.success}" class="mb-4 p-4 text-sm text-green-700 bg-green-50 rounded-xl border border-green-100">
        Account successfully created! Please login
    </div>
    <div th:if="${param.logout}" class="mb-4 p-4 text-sm text-blue-700 bg-blue-50 rounded-xl border border-blue-100">
        You are logged out
    </div>
    <div th:if="${error}" class="mb-4 p-4 text-sm text-red-700 bg-red-50 rounded-xl border border-red-100" th:text="${error}"></div>

    <form th:action="@{/login}" th:object="${loginDto}" method="post" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
            <input type="email" th:field="*{email}"
                   class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-slate-900 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-all"
                   placeholder="you@example.com" required>
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
            <input type="password" th:field="*{password}"
                   class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-slate-900 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-all"
                   placeholder="••••••••" required>
        </div>

        <button type="submit"
                class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2.5 rounded-xl transition-colors shadow-sm shadow-emerald-100">
            Sign in
        </button>
    </form>

    <div class="mt-6 text-center text-sm text-slate-600">
        Don't have an account?
        <a th:href="@{/register}" class="font-medium text-emerald-600 hover:text-emerald-500 transition-colors">Create now</a>
    </div>
</div>

</body>
</html>
