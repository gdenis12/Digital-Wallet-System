<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Wallet System</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 font-sans">

<div class="min-h-screen flex flex-col">
    <header class="bg-slate-900 text-white p-4 flex justify-between items-center shadow-md">
        <h1 class="text-xl font-bold tracking-wide">Wallet Control Panel ⚙️</h1>
        <div class="flex items-center gap-4">
            <span class="text-sm text-slate-300" th:text="${adminEmail}">admin@wallet.com</span>
            <a href="/login" class="bg-red-600 hover:bg-red-700 text-xs px-3 py-1.5 rounded transition-all">Sign Out</a>
        </div>
    </header>

    <main class="flex-1 p-6 max-w-7xl w-full mx-auto">
        <div class="mb-6">
            <h2 class="text-2xl font-bold text-slate-800">System Overview</h2>
            <p class="text-sm text-slate-500">Real-time database statistics and user management.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-xs border border-slate-200">
                <p class="text-xs font-semibold uppercase tracking-wider text-slate-400">Total Registered Clients</p>
                <h3 class="text-3xl font-black text-slate-800 mt-1" th:text="${totalUsers}">0</h3>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-xs border border-slate-200">
                <p class="text-xs font-semibold uppercase tracking-wider text-slate-400">Estimated System Volume</p>
                <h3 class="text-3xl font-black text-emerald-600 mt-1" th:text="${'$' + systemVolume}">$0</h3>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-xs border border-slate-200 p-6">
            <h3 class="text-lg font-bold text-slate-800 mb-4">User Management</h3>

            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                    <tr class="border-b border-slate-200 text-slate-400 text-xs uppercase tracking-wider">
                        <th class="py-3 px-4">ID</th>
                        <th class="py-3 px-4">Name</th>
                        <th class="py-3 px-4">Email</th>
                        <th class="py-3 px-4">Role</th>
                        <th class="py-3 px-4">Status</th>
                        <th class="py-3 px-4 text-right">Actions</th>
                    </tr>
                    </thead>
                    <tbody class="text-sm text-slate-700 divide-y divide-slate-100">
                    <tr th:each="user : ${users}" class="hover:bg-slate-50/75 transition-colors">
                        <td class="py-3 px-4 font-mono text-xs text-slate-400" th:text="${user.id}">1</td>
                        <td class="py-3 px-4 font-semibold text-slate-900" th:text="${user.name}">John Doe</td>
                        <td class="py-3 px-4 text-slate-500" th:text="${user.email}">john@example.com</td>
                        <td class="py-3 px-4">
                            <span class="px-2 py-0.5 rounded text-xs font-medium bg-slate-100 text-slate-600" th:text="${user.role}">USER</span>
                        </td>
                        <td class="py-3 px-4">
                            <span th:if="${user.status == 'ACTIVE'}" class="px-2 py-0.5 rounded text-xs font-medium bg-emerald-100 text-emerald-700">Active</span>
                            <span th:if="${user.status == 'BLOCKED'}" class="px-2 py-0.5 rounded text-xs font-medium bg-red-100 text-red-700">Blocked</span>
                        </td>
                        <td class="py-3 px-4 text-right">
                            <form th:if="${user.status == 'ACTIVE' and user.role != 'ADMIN'}" th:action="@{/admin/users/block}" method="post" class="inline">
                                <input type="hidden" name="userId" th:value="${user.id}"/>
                                <button type="submit" class="bg-red-50 hover:bg-red-100 text-red-600 text-xs px-2.5 py-1 rounded font-medium transition-colors">Block</button>
                            </form>

                            <form th:if="${user.status == 'BLOCKED'}" th:action="@{/admin/users/unblock}" method="post" class="inline">
                                <input type="hidden" name="userId" th:value="${user.id}"/>
                                <button type="submit" class="bg-emerald-50 hover:bg-emerald-100 text-emerald-600 text-xs px-2.5 py-1 rounded font-medium transition-colors">Unblock</button>
                            </form>

                            <span th:if="${user.role == 'ADMIN'}" class="text-xs text-slate-400 italic">System Owner</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

</body>
</html>
